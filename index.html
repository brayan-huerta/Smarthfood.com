<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMARTFOOD - Prototipo UX Final con Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; background-color: #EAEAEA; font-family: 'Nunito', sans-serif; display: grid; place-items: center; }
    .phone-shell { width: 400px; height: 850px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 24px 60px rgba(0,0,0,0.4); position: relative; }
    .phone-island { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 20px; z-index: 200; }
    .phone-screen { width: 100%; height: 100%; background: #F4F7F6; border-radius: 38px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Animaciones UX */
    @keyframes slideDown {
      0% { transform: translateY(-120%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDownToast {
      0% { transform: translateY(-150%); opacity: 0; }
      10% { transform: translateY(0); opacity: 1; }
      90% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-150%); opacity: 0; }
    }
    @keyframes scanline {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .push-notification {
      animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .toast-notification {
      animation: slideDownToast 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .scanner-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      background: #2F7D4A;
      box-shadow: 0 0 15px #2F7D4A, 0 0 30px #2F7D4A;
      animation: scanline 2.5s infinite linear;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div class="phone-shell">
    <div class="phone-island"></div>
    <div class="phone-screen" id="root"></div>
  </div>

  <script type="text/babel">
    // PALETA DE COLORES
    const SF_COLORS = {
      darkBlue: "#1A2B4C", 
      blueSoft: "#EAF0F8",
      green: "#2F7D4A",
      greenDark: "#1F5F3A",
      greenSoft: "#E8F5EC",
      white: "#FFFFFF",
      bgLight: "#F4F7F6",
      yellow: "#F4B740",
      orange: "#F28C38",
      orangeSoft: "#FEF4EB",
      red: "#E85D5D",
      redSoft: "#FDEFEF",
      ink: "#213529",
      muted: "#6B7B72",
      line: "rgba(26, 43, 76, 0.1)",
    };

    // ESTILOS NATIVOS A PRUEBA DE FALLOS
    const SF_STYLES = {
      screen: { height: "100%", width: "100%", background: SF_COLORS.bgLight, color: SF_COLORS.ink, fontFamily: "Poppins, Nunito, sans-serif", display: "flex", flexDirection: "column", position: "relative" },
      header: { padding: "54px 20px 20px", background: SF_COLORS.darkBlue, color: SF_COLORS.white, position: "sticky", top: 0, zIndex: 50, boxShadow: "0 4px 20px rgba(26, 43, 76, 0.15)" },
      body: { padding: "20px 20px 110px", display: "flex", flexDirection: "column", gap: 16, overflowY: "auto", flex: 1 },
      card: { background: SF_COLORS.white, borderRadius: 24, padding: 20, boxShadow: "0 8px 24px rgba(26, 43, 76, 0.05)", border: `1px solid ${SF_COLORS.line}` },
      cardGreen: { background: `linear-gradient(135deg, ${SF_COLORS.green} 0%, ${SF_COLORS.greenDark} 100%)`, color: SF_COLORS.white, borderRadius: 24, padding: 20, boxShadow: "0 8px 24px rgba(47, 125, 74, 0.25)" },
      row: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 },
      grid2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 },
      title: { margin: "4px 0 0", fontSize: 22, lineHeight: 1.2, fontWeight: 800 },
      h2: { margin: 0, fontSize: 16, lineHeight: 1.3, fontWeight: 800, color: SF_COLORS.ink },
      text: { margin: 0, fontSize: 13, lineHeight: 1.5, color: SF_COLORS.muted },
      label: { margin: 0, fontSize: 11, fontWeight: 800, letterSpacing: "0.05em", textTransform: "uppercase", color: SF_COLORS.muted },
      chip: { display: "inline-flex", alignItems: "center", gap: 6, borderRadius: 999, padding: "8px 14px", fontSize: 12, fontWeight: 800, cursor: "pointer", transition: "all 0.2s ease", border: "1px solid transparent" },
      nav: { position: "absolute", bottom: 0, left: 0, width: "100%", background: "rgba(255, 255, 255, 0.95)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderTop: `1px solid ${SF_COLORS.line}`, padding: "12px 16px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", zIndex: 100, borderBottomLeftRadius: 38, borderBottomRightRadius: 38 },
      navItem: { display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer", padding: "8px", borderRadius: "16px", transition: "all 0.2s", flex: 1 },
      input: { width: "100%", boxSizing: "border-box", border: `1px solid ${SF_COLORS.line}`, background: SF_COLORS.bgLight, borderRadius: 16, padding: "16px", fontSize: 14, color: SF_COLORS.ink, fontFamily: "Nunito, sans-serif", outline: "none", transition: "border 0.2s" }
    };

    // DATOS DE PRUEBA
    const SF_INVENTORY = [
      { id: 1, name: "Yogurt natural", category: "Lácteo", location: "Refrigeradora", expiresIn: 1, qty: "1 botella", icon: "🥛", maxLife: 14 },
      { id: 2, name: "Tomate", category: "Verdura", location: "Refrigeradora", expiresIn: 2, qty: "4 unidades", icon: "🍅", maxLife: 10 },
      { id: 3, name: "Pollo entero", category: "Carne", location: "Refrigeradora", expiresIn: 0, qty: "1 unidad", icon: "🍗", maxLife: 5 },
      { id: 4, name: "Arroz integral", category: "Grano", location: "Despensa", expiresIn: 18, qty: "750 g", icon: "🍚", maxLife: 30 },
      { id: 5, name: "Leche", category: "Lácteo", location: "Refrigeradora", expiresIn: 5, qty: "1 caja", icon: "🥛", maxLife: 14 },
      { id: 6, name: "Espinaca", category: "Verdura", location: "Refrigeradora", expiresIn: 6, qty: "1 bolsa", icon: "🥬", maxLife: 7 },
    ];

    const SF_RECIPES = [
      { title: "Bowl anti-desperdicio", uses: ["Tomate", "Pollo entero"], time: "15 min", impact: "Salva 2 alimentos críticos", emoji: "🥗" },
      { title: "Batido verde", uses: ["Yogurt natural", "Espinaca"], time: "5 min", impact: "Evita perder lácteos", emoji: "🥤" },
    ];

    function SFStatusMeta(days) {
      if (days <= 0) return { label: "Vence Hoy", color: SF_COLORS.red, bg: SF_COLORS.redSoft };
      if (days <= 3) return { label: `Quedan ${days} días`, color: SF_COLORS.orange, bg: SF_COLORS.orangeSoft };
      return { label: `Quedan ${days} días`, color: SF_COLORS.greenDark, bg: SF_COLORS.greenSoft };
    }

    // COMPONENTES BASE
    function SFHeader({ title, subtitle, onBack }) {
      return (
        <header style={SF_STYLES.header}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
            {onBack && (
              <button onClick={onBack} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#FFF", borderRadius: 12, width: 36, height: 36, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>←</button>
            )}
            <div style={{ flex: 1 }}>
              <p style={{ margin: 0, fontSize: 11, fontWeight: 800, letterSpacing: "0.05em", color: SF_COLORS.blueSoft }}>SMARTFOOD AI</p>
              <h1 style={{ ...SF_STYLES.title, color: SF_COLORS.white }}>{title}</h1>
              {subtitle && <p style={{ margin: "4px 0 0", fontSize: 13, color: "rgba(255,255,255,0.8)" }}>{subtitle}</p>}
            </div>
            {!onBack && (
              <div style={{ width: 40, height: 40, borderRadius: 20, background: SF_COLORS.white, display: "flex", justifyContent: "center", alignItems: "center", fontSize: 20, boxShadow: "0 4px 10px rgba(0,0,0,0.2)" }}>👤</div>
            )}
          </div>
        </header>
      );
    }

    function SFButton({ children, variant = "primary", onClick, style }) {
      const isPrimary = variant === "primary";
      return (
        <button onClick={onClick} style={{ border: isPrimary ? 0 : `2px solid ${SF_COLORS.darkBlue}`, borderRadius: 16, padding: "16px 20px", fontFamily: "Poppins, Nunito, sans-serif", fontWeight: 800, fontSize: 14, background: isPrimary ? SF_COLORS.darkBlue : "transparent", color: isPrimary ? SF_COLORS.white : SF_COLORS.darkBlue, boxShadow: isPrimary ? "0 8px 20px rgba(26, 43, 76, 0.2)" : "none", cursor: "pointer", width: "100%", transition: "all 0.1s", ...style }}>
          {children}
        </button>
      );
    }

    function SFCard({ children, style, onClick }) {
      return <section onClick={onClick} style={{ ...SF_STYLES.card, cursor: onClick ? "pointer" : "default", ...style }}>{children}</section>;
    }

    function SFTag({ children, tone = "soft" }) {
      return <span style={{ ...SF_STYLES.chip, background: tone === "warn" ? SF_COLORS.orangeSoft : SF_COLORS.greenSoft, color: tone === "warn" ? SF_COLORS.orange : SF_COLORS.greenDark }}>{children}</span>;
    }

    /* ========================================================
       PANTALLAS DE AUTENTICACIÓN (LOGIN & REGISTRO)
       ======================================================== */
    function SCRLogin({ onLogin, onGoToRegister }) {
      return (
        <div style={{ ...SF_STYLES.screen, background: SF_COLORS.darkBlue, padding: 24, justifyContent: "center" }}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div style={{ fontSize: 70, marginBottom: 10 }}>🍃</div>
            <h1 style={{ margin: 0, fontSize: 32, fontWeight: 900, color: SF_COLORS.white, letterSpacing: "1px" }}>SMARTFOOD</h1>
            <p style={{ margin: "4px 0 0", fontSize: 14, color: SF_COLORS.blueSoft }}>Sostenibilidad en tu cocina</p>
          </div>

          <SFCard style={{ padding: "32px 24px" }}>
            <h2 style={{ ...SF_STYLES.h2, marginBottom: 20, fontSize: 20 }}>Iniciar Sesión</h2>
            
            <input style={{ ...SF_STYLES.input, marginBottom: 12 }} placeholder="Correo electrónico" type="email" defaultValue="andrea@ejemplo.com" />
            <input style={{ ...SF_STYLES.input, marginBottom: 24 }} placeholder="Contraseña" type="password" defaultValue="123456" />
            
            <SFButton onClick={onLogin}>Ingresar a mi Cocina</SFButton>
            
            <div style={{ textAlign: "center", margin: "24px 0 16px", color: SF_COLORS.muted, fontSize: 12, fontWeight: 700 }}>O ingresa con</div>
            
            <SFButton variant="secondary" style={{ border: `1px solid ${SF_COLORS.line}`, color: SF_COLORS.ink, boxShadow: "none" }}>
              <span style={{ marginRight: 8 }}>🔵</span> Continuar con Google
            </SFButton>

            <p style={{ textAlign: "center", margin: "24px 0 0", fontSize: 13, color: SF_COLORS.muted }}>
              ¿No tienes cuenta? <span onClick={onGoToRegister} style={{ color: SF_COLORS.green, fontWeight: 800, cursor: "pointer" }}>Regístrate</span>
            </p>
          </SFCard>
        </div>
      );
    }

    function SCRRegister({ onRegister, onGoToLogin }) {
      return (
        <div style={{ ...SF_STYLES.screen, background: SF_COLORS.darkBlue, padding: 24, justifyContent: "center" }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 50 }}>🍃</div>
          </div>

          <SFCard style={{ padding: "32px 24px" }}>
            <h2 style={{ ...SF_STYLES.h2, marginBottom: 20, fontSize: 20 }}>Crear Cuenta</h2>
            
            <input style={{ ...SF_STYLES.input, marginBottom: 12 }} placeholder="Nombre completo" />
            <input style={{ ...SF_STYLES.input, marginBottom: 12 }} placeholder="Correo electrónico" type="email" />
            <input style={{ ...SF_STYLES.input, marginBottom: 24 }} placeholder="Crear contraseña" type="password" />
            
            <SFButton onClick={onRegister}>Registrarse</SFButton>

            <p style={{ textAlign: "center", margin: "24px 0 0", fontSize: 13, color: SF_COLORS.muted }}>
              ¿Ya tienes cuenta? <span onClick={onGoToLogin} style={{ color: SF_COLORS.green, fontWeight: 800, cursor: "pointer" }}>Ingresa aquí</span>
            </p>
          </SFCard>
        </div>
      );
    }

    /* ========================================================
       PANTALLAS PRINCIPALES DEL DASHBOARD
       ======================================================== */

    function SCRHomeDashboard({ navigateTo }) {
      const [showPush, setShowPush] = React.useState(true);

      return (
        <div style={SF_STYLES.body}>
          {showPush && (
            <div className="push-notification" style={{ background: "rgba(255, 255, 255, 0.95)", backdropFilter: "blur(10px)", borderRadius: 20, padding: 16, boxShadow: "0 12px 30px rgba(232, 93, 93, 0.25)", borderLeft: `6px solid ${SF_COLORS.red}`, display: "flex", gap: 12, alignItems: "flex-start", position: "relative", zIndex: 90 }}>
              <div style={{ background: SF_COLORS.redSoft, width: 40, height: 40, borderRadius: 20, display: "flex", justifyContent: "center", alignItems: "center", fontSize: 20 }}>⚠️</div>
              <div style={{ flex: 1 }}>
                <h3 style={{ margin: 0, fontSize: 14, fontWeight: 800, color: SF_COLORS.ink }}>Alerta de Vencimiento</h3>
                <p style={{ margin: "4px 0 8px", fontSize: 12, color: SF_COLORS.muted }}>El <strong>Pollo entero</strong> vence hoy. ¿Deseas ver recetas para usarlo?</p>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { setShowPush(false); navigateTo('recipes'); }} style={{ background: SF_COLORS.darkBlue, color: "#FFF", border: "none", padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Ver Recetas</button>
                  <button onClick={() => setShowPush(false)} style={{ background: SF_COLORS.bgLight, color: SF_COLORS.muted, border: "none", padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Ignorar</button>
                </div>
              </div>
            </div>
          )}

          <div style={SF_STYLES.cardGreen}>
            <div style={SF_STYLES.row}>
              <div>
                <p style={{ margin: 0, fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.8)" }}>Ahorro estimado este mes</p>
                <p style={{ margin: "4px 0 0", fontSize: 32, fontWeight: 900 }}>S/ 86.50</p>
              </div>
              <div style={{ fontSize: 40, background: "rgba(255,255,255,0.2)", width: 60, height: 60, borderRadius: 30, display: "flex", justifyContent: "center", alignItems: "center" }}>💰</div>
            </div>
          </div>

          <h2 style={SF_STYLES.h2}>Receta sugerida para ti</h2>
          
          <SFCard onClick={() => navigateTo('recipes')} style={{ transition: "transform 0.1s" }}>
            <div style={SF_STYLES.row}>
              <div>
                <SFTag tone="warn">Salva 2 alimentos</SFTag>
                <h3 style={{ margin: "8px 0 4px", fontSize: 16, fontWeight: 800 }}>Bowl anti-desperdicio</h3>
                <p style={{ margin: 0, fontSize: 12, color: SF_COLORS.muted }}>Usa tomate y pollo de tu refri.</p>
              </div>
              <div style={{ width: 70, height: 70, background: SF_COLORS.blueSoft, borderRadius: 20, display: "flex", justifyContent: "center", alignItems: "center", fontSize: 36 }}>🥗</div>
            </div>
          </SFCard>
        </div>
      );
    }

    function SCRFoodInventory() {
      const [activeFilter, setActiveFilter] = React.useState("Todo");

      const totalCount = SF_INVENTORY.length;
      const refriCount = SF_INVENTORY.filter(i => i.location === "Refrigeradora").length;
      const despensaCount = SF_INVENTORY.filter(i => i.location === "Despensa").length;

      const displayedInventory = SF_INVENTORY.filter(item => {
        if (activeFilter === "Todo") return true;
        return item.location === activeFilter;
      });

      return (
        <div style={SF_STYLES.body}>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-start" }}>
            <span onClick={() => setActiveFilter("Todo")} style={{ ...SF_STYLES.chip, background: activeFilter === "Todo" ? SF_COLORS.darkBlue : SF_COLORS.white, color: activeFilter === "Todo" ? SF_COLORS.white : SF_COLORS.darkBlue, border: `1px solid ${activeFilter === "Todo" ? SF_COLORS.darkBlue : SF_COLORS.line}` }}>
              Todo ({totalCount})
            </span>
            <span onClick={() => setActiveFilter("Refrigeradora")} style={{ ...SF_STYLES.chip, background: activeFilter === "Refrigeradora" ? SF_COLORS.darkBlue : SF_COLORS.white, color: activeFilter === "Refrigeradora" ? SF_COLORS.white : SF_COLORS.darkBlue, border: `1px solid ${activeFilter === "Refrigeradora" ? SF_COLORS.darkBlue : SF_COLORS.line}` }}>
              ❄️ Refri ({refriCount})
            </span>
            <span onClick={() => setActiveFilter("Despensa")} style={{ ...SF_STYLES.chip, background: activeFilter === "Despensa" ? SF_COLORS.darkBlue : SF_COLORS.white, color: activeFilter === "Despensa" ? SF_COLORS.white : SF_COLORS.darkBlue, border: `1px solid ${activeFilter === "Despensa" ? SF_COLORS.darkBlue : SF_COLORS.line}` }}>
              🧺 Despensa ({despensaCount})
            </span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {displayedInventory.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 20px", color: SF_COLORS.muted }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>📭</div>
                <p style={{ margin: 0, fontWeight: 700 }}>No hay productos aquí.</p>
              </div>
            ) : (
              displayedInventory.map((item) => {
                const meta = SFStatusMeta(item.expiresIn);
                const progressWidth = Math.max(0, Math.min(100, (item.expiresIn / item.maxLife) * 100));
                
                return (
                  <div key={item.id} style={{ background: SF_COLORS.white, borderRadius: 20, padding: 16, display: "flex", alignItems: "center", gap: 16, border: `1px solid ${SF_COLORS.line}` }}>
                    <div style={{ width: 50, height: 50, background: SF_COLORS.bgLight, borderRadius: 14, display: "flex", justifyContent: "center", alignItems: "center", fontSize: 24, flexShrink: 0 }}>{item.icon}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <h3 style={{ margin: 0, fontSize: 14, fontWeight: 800, color: SF_COLORS.ink }}>{item.name}</h3>
                        <span style={{ ...SF_STYLES.chip, background: meta.bg, color: meta.color, fontSize: 10, padding: "4px 8px" }}>{meta.label}</span>
                      </div>
                      <p style={{ margin: "4px 0 8px", fontSize: 12, color: SF_COLORS.muted }}>{item.qty} · {item.category}</p>
                      <div style={{ height: 6, background: SF_COLORS.bgLight, borderRadius: 3, overflow: "hidden", width: "100%" }}>
                        <div style={{ width: `${progressWidth}%`, height: "100%", background: meta.color, borderRadius: 3 }}></div>
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    function SCRAddFood({ triggerToast }) {
      return (
        <div style={SF_STYLES.body}>
          <div style={{ background: "#000", borderRadius: 32, height: 320, position: "relative", overflow: "hidden", display: "flex", justifyContent: "center", alignItems: "center", boxShadow: "0 12px 30px rgba(0,0,0,0.2)" }}>
            <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=400&q=80" style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.6 }} alt="Camera feed" />
            <div style={{ position: "absolute", top: "10%", width: "80%", height: "60%", border: "2px dashed rgba(255,255,255,0.7)", borderRadius: 20 }}>
               <div className="scanner-line"></div>
            </div>
            <div style={{ position: "absolute", bottom: 20, textAlign: "center", color: "#FFF", width: "100%" }}>
              <div style={{ width: 66, height: 66, background: "rgba(255,255,255,0.3)", borderRadius: 33, display: "flex", justifyContent: "center", alignItems: "center", margin: "0 auto", cursor: "pointer", border: "2px solid #FFF" }}>
                <div style={{ width: 54, height: 54, background: "#FFF", borderRadius: 27 }}></div>
              </div>
              <p style={{ margin: "12px 0 0", fontSize: 12, fontWeight: 700, letterSpacing: "0.05em" }}>ESCANEAR PRODUCTO</p>
            </div>
          </div>

          <div style={SF_STYLES.row}>
            <hr style={{ flex: 1, border: "none", borderTop: `1px solid ${SF_COLORS.line}` }} />
            <span style={{ fontSize: 11, color: SF_COLORS.muted, fontWeight: 800, textTransform: "uppercase" }}>O Ingreso Manual</span>
            <hr style={{ flex: 1, border: "none", borderTop: `1px solid ${SF_COLORS.line}` }} />
          </div>

          <SFCard>
             <label style={{ display: "block", marginBottom: 12 }}>
                <p style={{ margin: "0 0 8px", fontSize: 12, fontWeight: 800, color: SF_COLORS.darkBlue }}>Nombre del producto</p>
                <input style={SF_STYLES.input} placeholder="Ej. Manzanas rojas" />
             </label>
             {/* NOTIFICACIÓN IN-APP (Sustituye al alert) */}
             <SFButton variant="secondary" onClick={() => triggerToast("¡Producto añadido con éxito!")}>Guardar Manualmente</SFButton>
          </SFCard>
        </div>
      );
    }

    function SCRRecipeSuggestions() {
      return (
        <div style={SF_STYLES.body}>
          <SFCard style={{ background: SF_COLORS.blueSoft, border: "none" }}>
            <h2 style={SF_STYLES.h2}>Basadas en lo que tienes</h2>
            <p style={{ ...SF_STYLES.text, marginTop: 6 }}>La IA cruza tus ingredientes a punto de vencer para sugerirte qué cocinar hoy.</p>
          </SFCard>

          {SF_RECIPES.map((recipe) => (
            <SFCard key={recipe.title}>
              <div style={SF_STYLES.row}>
                <div>
                  <h2 style={SF_STYLES.h2}>{recipe.title}</h2>
                  <p style={{ ...SF_STYLES.text, marginTop: 5, color: SF_COLORS.green, fontWeight: 700 }}>{recipe.impact}</p>
                </div>
                <div style={{ fontSize: 36, background: SF_COLORS.bgLight, width: 60, height: 60, display: "flex", justifyContent: "center", alignItems: "center", borderRadius: 16 }}>{recipe.emoji}</div>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 16 }}>
                <SFTag>⏱️ {recipe.time}</SFTag>
                {recipe.uses.map((food) => (
                  <span key={food} style={{...SF_STYLES.chip, background: SF_COLORS.bgLight, border: `1px solid ${SF_COLORS.line}`, padding: "6px 10px", fontSize: 10, color: SF_COLORS.ink }}>
                    {food}
                  </span>
                ))}
              </div>
            </SFCard>
          ))}
        </div>
      );
    }

    function SCRMoreMenu({ navigateTo }) {
      const menuOptions = [
        { id: 'reports', title: "Reportes y Ahorro", icon: "📊", desc: "Métricas de tu consumo." },
        { id: 'shopping', title: "Lista Inteligente", icon: "🛒", desc: "Qué comprar según tu inventario." },
        { id: 'search', title: "Buscar Alimento", icon: "🔍", desc: "Encuentra algo en tu cocina." },
        { id: 'filter', title: "Filtros y Vencimientos", icon: "⏳", desc: "Revisa qué vence pronto." },
        { id: 'tips', title: "Tips de Almacenamiento", icon: "💡", desc: "Aprende a conservar mejor." },
        { id: 'share', title: "Compartir Familia", icon: "📤", desc: "Sincroniza con tu hogar." },
        { id: 'prefs', title: "Configuración", icon: "⚙️", desc: "Preferencias de alertas." }
      ];

      return (
        <div style={SF_STYLES.body}>
          <div style={{ display: "grid", gap: 12 }}>
            {menuOptions.map(opt => (
              <div key={opt.id} onClick={() => navigateTo(opt.id)} style={{ background: SF_COLORS.white, borderRadius: 20, padding: 16, display: "flex", alignItems: "center", gap: 16, cursor: "pointer", border: `1px solid ${SF_COLORS.line}`, boxShadow: "0 4px 12px rgba(26,43,76,0.03)" }}>
                <div style={{ width: 44, height: 44, background: SF_COLORS.blueSoft, borderRadius: 12, display: "flex", justifyContent: "center", alignItems: "center", fontSize: 20 }}>{opt.icon}</div>
                <div>
                  <h3 style={{ margin: 0, fontSize: 14, fontWeight: 800, color: SF_COLORS.darkBlue }}>{opt.title}</h3>
                  <p style={{ margin: "2px 0 0", fontSize: 12, color: SF_COLORS.muted }}>{opt.desc}</p>
                </div>
                <div style={{ marginLeft: "auto", color: "#ccc", fontSize: 18 }}>›</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* PANTALLAS SECUNDARIAS */
    function SCRSavingsReport() {
      return (
        <div style={SF_STYLES.body}>
          <SFCard style={{ textAlign: "center" }}>
            <p style={{ margin: 0, fontSize: 12, fontWeight: 800, color: SF_COLORS.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Aprovechamiento Mensual</p>
            <div style={{ position: "relative", width: 160, height: 160, margin: "24px auto", borderRadius: "50%", background: `conic-gradient(${SF_COLORS.green} 0% 78%, ${SF_COLORS.redSoft} 78% 100%)`, display: "flex", justifyContent: "center", alignItems: "center", boxShadow: "0 8px 24px rgba(47, 125, 74, 0.2)" }}>
              <div style={{ width: 110, height: 110, background: SF_COLORS.white, borderRadius: "50%", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", boxShadow: "inset 0 4px 10px rgba(0,0,0,0.05)" }}>
                <span style={{ fontSize: 32, fontWeight: 900, color: SF_COLORS.green }}>78%</span>
                <span style={{ fontSize: 10, color: SF_COLORS.muted, fontWeight: 800, textTransform: "uppercase" }}>Salvado</span>
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 12, height: 12, borderRadius: 6, background: SF_COLORS.green }}></div><span style={{ fontSize: 13, color: SF_COLORS.ink, fontWeight: 700 }}>Consumido</span></div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 12, height: 12, borderRadius: 6, background: SF_COLORS.redSoft }}></div><span style={{ fontSize: 13, color: SF_COLORS.ink, fontWeight: 700 }}>Desechado</span></div>
            </div>
          </SFCard>
          <div style={SF_STYLES.grid2}>
            <SFCard style={{ padding: "16px", textAlign: "center", background: SF_COLORS.blueSoft, border: "none" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>💰</div>
              <p style={{ margin: 0, fontSize: 11, color: SF_COLORS.muted, fontWeight: 800, textTransform: "uppercase" }}>Dinero Ahorrado</p>
              <p style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 900, color: SF_COLORS.darkBlue }}>S/ 86.50</p>
            </SFCard>
            <SFCard style={{ padding: "16px", textAlign: "center", background: SF_COLORS.greenSoft, border: "none" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>🌍</div>
              <p style={{ margin: 0, fontSize: 11, color: SF_COLORS.muted, fontWeight: 800, textTransform: "uppercase" }}>Comida Salvada</p>
              <p style={{ margin: "4px 0 0", fontSize: 22, fontWeight: 900, color: SF_COLORS.greenDark }}>4.8 kg</p>
            </SFCard>
          </div>
        </div>
      );
    }
    // Resto de pantallas secundarias estáticas para evitar bloqueos
    function SCRSmartShoppingList() { return <div style={SF_STYLES.body}><SFCard><h2 style={SF_STYLES.h2}>Lista automatizada</h2><p style={SF_STYLES.text}>La app cruza tu inventario con básicos para evitar compras dobles.</p></SFCard></div>; }
    function SCRSearchFood() { return <div style={SF_STYLES.body}><input style={SF_STYLES.input} placeholder="🔍 Escribe 'Tomate' o 'Pollo'..." /></div>; }
    function SCRFoodFilter() { return <div style={SF_STYLES.body}><SFCard><h3 style={SF_STYLES.h2}>Periodo de vencimiento</h3></SFCard></div>; }
    function SCRStorageTips() { return <div style={SF_STYLES.body}><SFCard><div style={{ fontSize: 32 }}>🍎</div><h3 style={SF_STYLES.h2}>Separa frutas maduras</h3></SFCard></div>; }
    function SCRShareInventory() { return <div style={SF_STYLES.body}><SFCard style={{textAlign: "center"}}><h2 style={SF_STYLES.h2}>Cocina Compartida</h2></SFCard></div>; }
    function SCRAppPreferences() { return <div style={SF_STYLES.body}><SFCard><h3 style={SF_STYLES.h2}>Días previos para Alerta</h3></SFCard></div>; }

    /* ========================================================
       APLICACIÓN PRINCIPAL Y ESTADOS DE AUTENTICACIÓN
       ======================================================== */
    function App() {
      // ESTADOS DE AUTENTICACIÓN
      const [isAuthenticated, setIsAuthenticated] = React.useState(false);
      const [authScreen, setAuthScreen] = React.useState('login'); // 'login' o 'register'
      
      // ESTADOS DE NAVEGACIÓN
      const [currentTab, setCurrentTab] = React.useState('home');
      const [subScreen, setSubScreen] = React.useState(null);
      
      // ESTADO DEL TOAST (Notificación in-app)
      const [toastMsg, setToastMsg] = React.useState(null);

      const triggerToast = (message) => {
        setToastMsg(message);
        setTimeout(() => setToastMsg(null), 3000); // Desaparece en 3s
      };

      // Si NO está autenticado, mostramos los flujos de Login/Registro
      if (!isAuthenticated) {
        if (authScreen === 'login') {
          return <SCRLogin onLogin={() => setIsAuthenticated(true)} onGoToRegister={() => setAuthScreen('register')} />;
        }
        return <SCRRegister onRegister={() => setIsAuthenticated(true)} onGoToLogin={() => setAuthScreen('login')} />;
      }

      // Si SÍ está autenticado, mostramos el Dashboard Principal
      const mainTabs = {
        'home': { comp: <SCRHomeDashboard navigateTo={setCurrentTab} />, title: "Hola, Andrea", sub: "3 productos requieren atención." },
        'inventory': { comp: <SCRFoodInventory />, title: "Tu Inventario", sub: "Filtra por ubicación y caducidad." },
        'add': { comp: <SCRAddFood triggerToast={triggerToast} />, title: "Registrar Alimento", sub: "Ingreso ultra rápido con IA." },
        'recipes': { comp: <SCRRecipeSuggestions />, title: "Recetas Inteligentes", sub: "Ideas para no desperdiciar." },
        'menu': { comp: <SCRMoreMenu navigateTo={setSubScreen} />, title: "Opciones", sub: "Configura y analiza tu cuenta." }
      };

      const subScreens = {
        'reports': { comp: <SCRSavingsReport />, title: "Reporte de Ahorro" },
        'shopping': { comp: <SCRSmartShoppingList />, title: "Lista de Compras" },
        'search': { comp: <SCRSearchFood />, title: "Buscador" },
        'filter': { comp: <SCRFoodFilter />, title: "Filtros Rápidos" },
        'tips': { comp: <SCRStorageTips />, title: "Tips de Guardado" },
        'share': { comp: <SCRShareInventory />, title: "Sincronización" },
        'prefs': { comp: <SCRAppPreferences />, title: "Preferencias" }
      };

      const navItems = [
        { key: 'home', label: 'Inicio', icon: '🏠' },
        { key: 'inventory', label: 'Inventario', icon: '📦' },
        { key: 'add', label: 'Escanear', icon: '📷' },
        { key: 'recipes', label: 'Recetas', icon: '🥗' },
        { key: 'menu', label: 'Menú', icon: '☰' }
      ];

      const handleTabChange = (key) => {
        setCurrentTab(key);
        setSubScreen(null); 
      };

      const activeData = subScreen ? subScreens[subScreen] : mainTabs[currentTab];

      return (
        <div style={SF_STYLES.screen}>
          
          {/* TOAST DE NOTIFICACIÓN SUPERIOR (Reemplaza a alert) */}
          {toastMsg && (
            <div className="toast-notification" style={{ position: "absolute", top: 30, left: "5%", width: "90%", background: SF_COLORS.green, color: SF_COLORS.white, padding: "16px 20px", borderRadius: 16, zIndex: 9999, display: "flex", alignItems: "center", gap: 12, boxShadow: "0 12px 30px rgba(47, 125, 74, 0.4)" }}>
              <span style={{ fontSize: 22 }}>✅</span>
              <span style={{ fontSize: 14, fontWeight: 700 }}>{toastMsg}</span>
            </div>
          )}

          <SFHeader 
            title={activeData.title} 
            subtitle={activeData.sub} 
            onBack={subScreen ? () => setSubScreen(null) : null} 
          />
          
          {activeData.comp}

          <nav style={SF_STYLES.nav}>
            {navItems.map((item) => {
              const isActive = (!subScreen && currentTab === item.key) || (subScreen && item.key === 'menu');
              return (
                <div 
                  key={item.key} 
                  onClick={() => handleTabChange(item.key)}
                  style={{
                    ...SF_STYLES.navItem,
                    background: isActive ? SF_COLORS.blueSoft : "transparent",
                  }}
                >
                  <span style={{ fontSize: 20, opacity: isActive ? 1 : 0.6 }}>{item.icon}</span>
                  <span style={{ fontSize: 10, fontWeight: isActive ? 800 : 600, color: isActive ? SF_COLORS.darkBlue : SF_COLORS.muted }}>
                    {item.label}
                  </span>
                </div>
              );
            })}
          </nav>
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
